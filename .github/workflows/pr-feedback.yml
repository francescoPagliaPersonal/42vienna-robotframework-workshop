name: PR Test Feedback
on:
  pull_request_target:
    branches: [main]

permissions:
  pull-requests: write
  security-events: write

jobs:
  test-and-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Robocop lint
        id: robocop
        continue-on-error: true
        run: |
          uv run robocop check \
            --reports sarif,text_file \
            --exit-zero \
            tests/ resources/

      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .sarif.json
          category: robocop-pr

      - name: Initialize Browser Library
        run: uv run rfbrowser init chromium

      - name: Run Robot Framework tests
        id: tests
        continue-on-error: true
        run: |
          uv run robot \
            --outputdir results \
            --loglevel DEBUG \
            --variable HEADLESS:true \
            tests/ 2>&1 | tee test-output.txt

      - name: Parse results and comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read test output
            let testOutput = '';
            try {
              testOutput = fs.readFileSync('test-output.txt', 'utf8');
            } catch (e) {
              testOutput = 'Could not read test output.';
            }
            const testLines = testOutput.trim().split('\n');
            const testSummary = testLines.slice(-10).join('\n');

            // Read robocop output
            let robocopOutput = 'No issues found.';
            try {
              robocopOutput = fs.readFileSync('robocop.txt', 'utf8').trim() || 'No issues found.';
            } catch (e) {
              robocopOutput = 'No issues found.';
            }

            const testPassed = '${{ steps.tests.outcome }}' === 'success';
            const testIcon = testPassed ? '✅' : '❌';
            const testStatus = testPassed ? 'All tests passed!' : 'Some tests failed.';

            // Count robocop issues from SARIF
            let issueCount = 0;
            try {
              const sarif = JSON.parse(fs.readFileSync('.sarif.json', 'utf8'));
              issueCount = sarif.runs?.[0]?.results?.length || 0;
            } catch (e) {}

            const robocopIcon = issueCount === 0 ? '✅' : '⚠️';
            const robocopStatus = issueCount === 0
              ? 'No issues found.'
              : `${issueCount} issue(s) found — see Code Scanning tab for details.`;

            const body = `## ${testIcon} Robot Framework Test Results

            **Status:** ${testStatus}

            <details>
            <summary>Test Output (last 10 lines)</summary>

            \`\`\`
            ${testSummary}
            \`\`\`

            </details>

            ## ${robocopIcon} Robocop Code Quality

            **Status:** ${robocopStatus}

            <details>
            <summary>Robocop Output</summary>

            \`\`\`
            ${robocopOutput}
            \`\`\`

            </details>

            Full results (log.html, report.html) are available as build artifacts.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-robot-results
          path: results/

      - name: Upload Robocop reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-robocop-reports
          path: |
            .sarif.json
            robocop.txt
